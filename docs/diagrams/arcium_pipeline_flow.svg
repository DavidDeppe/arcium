<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
  text { font-family: Arial, sans-serif; fill: #1a1a1a; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; font-weight: 400; fill: #555; }
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray text { fill: #2C2C2A; }
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal text { fill: #04342C; }
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral text { fill: #4A1B0C; }
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber text { fill: #412402; }
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue text { fill: #042C53; }
  .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green text { fill: #173404; }
  .c-red rect { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red text { fill: #501313; }
  .arr { stroke: #888; stroke-width: 1.5; fill: none; }
</style>
</defs>
<text class="th" x="340" y="28" text-anchor="middle" font-size="16">Pipeline execution flow</text>
<g class="c-teal"><rect x="220" y="44" width="240" height="52" rx="8" stroke-width="0.5"/><text class="th" x="340" y="64" text-anchor="middle" dominant-baseline="central">Phase 1 — Team Lead</text><text class="ts" x="340" y="82" text-anchor="middle" dominant-baseline="central">Reads vault, writes brief + success criteria</text></g>
<line x1="340" y1="96" x2="340" y2="120" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal"><rect x="220" y="120" width="240" height="52" rx="8" stroke-width="0.5"/><text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central">Phase 2 — Architect</text><text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">Spec, MVP scope, acceptance tests</text></g>
<line x1="340" y1="172" x2="340" y2="196" class="arr" marker-end="url(#arrow)"/>
<g class="c-coral"><rect x="220" y="196" width="240" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central">Phase 3 — Engineer</text><text class="ts" x="340" y="236" text-anchor="middle" dominant-baseline="central">Writes code, self-verification loop</text><text class="ts" x="340" y="252" text-anchor="middle" dominant-baseline="central">Runs tests until passing</text></g>
<line x1="340" y1="260" x2="340" y2="284" class="arr" marker-end="url(#arrow)"/>
<g class="c-amber"><rect x="220" y="284" width="240" height="64" rx="8" stroke-width="0.5"/><text class="th" x="340" y="304" text-anchor="middle" dominant-baseline="central">Phase 4 — Critic</text><text class="ts" x="340" y="322" text-anchor="middle" dominant-baseline="central">Runs engineer tests + acceptance tests</text><text class="ts" x="340" y="338" text-anchor="middle" dominant-baseline="central">Independent QA verdict</text></g>
<line x1="340" y1="348" x2="340" y2="372" class="arr" marker-end="url(#arrow)"/>
<polygon points="340,372 420,404 340,436 260,404" fill="none" stroke="#888" stroke-width="1"/>
<text class="ts" x="340" y="408" text-anchor="middle" dominant-baseline="central">Verdict?</text>
<line x1="420" y1="404" x2="518" y2="404" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="468" y="396" text-anchor="middle">PASS</text>
<g class="c-green"><rect x="520" y="380" width="120" height="48" rx="8" stroke-width="0.5"/><text class="th" x="580" y="396" text-anchor="middle" dominant-baseline="central">Phase 5</text><text class="ts" x="580" y="412" text-anchor="middle" dominant-baseline="central">Communications</text></g>
<line x1="340" y1="436" x2="340" y2="460" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="356" y="452" text-anchor="start">Conditions</text>
<g class="c-blue"><rect x="220" y="460" width="240" height="52" rx="8" stroke-width="0.5"/><text class="th" x="340" y="480" text-anchor="middle" dominant-baseline="central">Polish loop</text><text class="ts" x="340" y="498" text-anchor="middle" dominant-baseline="central">Targeted Engineer fix + spot-check</text></g>
<path d="M460 486 Q540 486 540 428" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="260" y1="404" x2="142" y2="404" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="198" y="396" text-anchor="middle">FAIL</text>
<g class="c-red"><rect x="40" y="358" width="100" height="92" rx="8" stroke-width="0.5"/><text class="th" x="90" y="390" text-anchor="middle" dominant-baseline="central">Rework</text><text class="ts" x="90" y="408" text-anchor="middle" dominant-baseline="central">Routes to</text><text class="ts" x="90" y="424" text-anchor="middle" dominant-baseline="central">Engineer or</text><text class="ts" x="90" y="440" text-anchor="middle" dominant-baseline="central">Architect</text></g>
<path d="M90 358 Q90 240 218 240" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="580" y1="428" x2="580" y2="488" stroke="#888" stroke-width="1"/>
<line x1="580" y1="488" x2="400" y2="488" stroke="#888" stroke-width="1"/>
<line x1="400" y1="488" x2="400" y2="538" class="arr" marker-end="url(#arrow)"/>
<g class="c-gray"><rect x="280" y="540" width="240" height="52" rx="8" stroke-width="0.5"/><text class="th" x="400" y="560" text-anchor="middle" dominant-baseline="central">Deliverables</text><text class="ts" x="400" y="578" text-anchor="middle" dominant-baseline="central">Code, tests, docs, stakeholder pack</text></g>
<text class="ts" x="625" y="500" text-anchor="middle">~$1.31</text>
<text class="ts" x="625" y="516" text-anchor="middle">per run</text>
</svg>
